name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from the "packageManager" field in package.json.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Dummy, non-secret values so the build can compile. Real values live
          # in Vercel project settings. None of these reach a real service in CI.
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:cidummy"
          FIREBASE_ADMIN_PROJECT_ID: ci-dummy
          FIREBASE_ADMIN_CLIENT_EMAIL: ci@ci-dummy.iam.gserviceaccount.com
          FIREBASE_ADMIN_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nCI\n-----END PRIVATE KEY-----\n"
          RESEND_API_KEY: re_ci_dummy
          RESEND_FROM_EMAIL: onboarding@resend.dev
          TICKET_SECRET: ci-dummy-secret
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
